

<div class="row my-4">
    <div class="col-md-4" *ngFor="let p of productsArr; trackBy : trackByProduct">
        <div class="card mb-4">
            <div class="card-body">
                <div>
                    <h3><strong>{{p.pname}}</strong></h3>
                </div>
                <div class="image-wrapper">
                    <img [src]="p.imageUrl">
                </div>
                <br>
                <p>{{p.description}}</p>
            </div>
            <div class="card-footer">
                <button class="btn btn-sm btn-info btn-block">More Details...</button>
            </div>
        </div>
    </div>
</div>
