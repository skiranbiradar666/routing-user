

<div class="row my-4">
  <div class="col-12 d-flex justify-content-between align-items-center">
    <h2 class="font-weight-bold text-info">Products</h2>

    <button
      routerLink="/products/addProduct"
      mat-raised-button color="primary">
      + Add Product
    </button>
  </div>
</div>

<div class="row my-4">
    <div class="col-md-4 mb-4" *ngFor="let p of productsArr; trackBy : trackByProduct">
        <div class="card mb-4 h-100">
            <div class="card-body">
                <div>
                    <h3><strong>{{p.pname}}</strong></h3>
                </div>
                <div class="image-wrapper">
                    <img [src]="p.imageUrl">
                </div>
                <br>
                <p>{{p.description}}</p>
            </div>
            <div class="card-footer">
                <button 
                [routerLink]="['/products', p.pid]"
                class="btn btn-sm btn-info btn-block">More Details...</button>
            </div>
        </div>
    </div>
</div>
